<script>
// ── SENASA DATA (151 confirmed rows with inspector) ───────────

// Weekly rows (all confirmed modes)



// ── TABS ─────────────────────────────────────────────────────
const TABS=[
  {id:'forecast',ix:'01',label:'Forecast'},
  {id:'ports',   ix:'02',label:'Ports'},
  {id:'weekly',  ix:'03',label:'Weekly'},
  {id:'pmi',     ix:'04',label:'PMI'},
  {id:'air',     ix:'05',label:'Air Program'},
  {id:'execute', ix:'06',label:'Execute'},
  {id:'kpi',     ix:'07',label:'KPI Tracker'},
  {id:'rutas',   ix:'08',label:'Destinos & Rutas'},
];
const tabBar=document.getElementById('tabBar');
TABS.forEach((t,i)=>{
  const b=document.createElement('button');
  b.className='tb'+(i===0?' active':'');
  b.dataset.tab=t.id;
  b.innerHTML=`<span class="ix">${t.ix}</span>${t.label}`;
  b.onclick=()=>sw(t.id);
  tabBar.appendChild(b);
});
function sw(id){
  document.querySelectorAll('.tb').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='p-'+id));
}

let SENASA,WROWS,AIR,AIRLINES,FWKS,WKL,KPI,EX,DEST,LINEAS,PMI_PORTS,FWKS_MODE,EMBARQUES,TR_PROGRAM,PORTS_RAW;
async function loadDataAndInit(){
  const res = await fetch('data.json', {cache:'no-store'});
  const d = await res.json();

// ── CHART ────────────────────────────────────────────────────
function buildChart(wks,sid,metric){
  metric=metric||'fcl';
  const kC=metric==='fcl'?'fcl_conf':'pal_conf',kP=metric==='fcl'?'fcl_proj':'pal_proj',kA=metric==='fcl'?'fcl_addon':'pal_addon';
  const W=900,H=320,pL=40,pB=32,pT=16;
  const mxV=Math.max(...wks.map(w=>Math.max(w[kC],w[kP]+w[kA])),1);
  const xOf=i=>pL+i*(W-pL-16)/(wks.length-1);
  const yOf=v=>H-pB-(v/mxV)*(H-pT-pB);
  const pC=wks.map((w,i)=>w[kC]>0?{x:xOf(i),y:yOf(w[kC]),w,i}:null).filter(Boolean);
  const pP=wks.map((w,i)=>({x:xOf(i),y:yOf(w[kP]),w,i}));
  const mkP=pts=>pts.map((p,i)=>(i===0?'M':'L')+p.x.toFixed(0)+','+p.y.toFixed(0)).join(' ');
  const grid=[0,.25,.5,.75,1].map(f=>{const y=pT+(1-f)*(H-pT-pB);return`<line x1="${pL}" y1="${y.toFixed(0)}" x2="${W-4}" y2="${y.toFixed(0)}" stroke="#EFEBE0" stroke-width="1"/><text x="${pL-5}" y="${(y+4).toFixed(0)}" text-anchor="end" font-size="9" fill="#9CA3AF" font-family="JetBrains Mono">${(mxV*f).toFixed(0)}</text>`;}).join('');
  const xlbls=wks.map((w,i)=>`<text x="${xOf(i).toFixed(0)}" y="${H-8}" text-anchor="middle" font-size="9" fill="${w[kC]>0?'#1C2940':'#9CA3AF'}" font-family="JetBrains Mono">${w.label}</text>`).join('');
  const addons=wks.map((w,i)=>{
    if(w[kA]<=0)return'';
    const x=xOf(i),yB=yOf(w[kP]+w[kA]);
    const up=(w[kP]+w[kA])>=w[kC];
    const col=up?'#2E8B57':'#C0392B',bg=up?'#E5F3EA':'#FBE5E1',sym=up?'▲':'▼';
    return`<rect x="${(x-18).toFixed(0)}" y="${(yB-20).toFixed(0)}" width="36" height="14" rx="3" fill="${bg}"/><text x="${x.toFixed(0)}" y="${(yB-9).toFixed(0)}" text-anchor="middle" font-size="8.5" fill="${col}" font-family="JetBrains Mono" font-weight="700">${sym}${f1(w[kA])}</text>`;
  }).join('');
  const dC=pC.map(p=>`<circle class="dlc" data-i="${p.i}" data-t="c" cx="${p.x.toFixed(0)}" cy="${p.y.toFixed(0)}" r="5" fill="#2E8FB0" stroke="#fff" stroke-width="2" style="cursor:pointer;"/>`).join('');
  const dP=pP.map(p=>`<circle class="dlc" data-i="${p.i}" data-t="p" cx="${p.x.toFixed(0)}" cy="${p.y.toFixed(0)}" r="4" fill="#E8A33D" stroke="#fff" stroke-width="1.5" style="cursor:pointer;"/>`).join('');
  const aC=pC.length>1?`<path d="${mkP(pC)} L${pC.at(-1).x},${H-pB} L${pC[0].x},${H-pB} Z" fill="#2E8FB0" opacity=".08"/>`:'';
  const aP=pP.length>1?`<path d="${mkP(pP)} L${pP.at(-1).x},${H-pB} L${pP[0].x},${H-pB} Z" fill="#E8A33D" opacity=".07"/>`:'';
  return`<svg id="${sid}" viewBox="0 0 ${W} ${H}" style="width:100%;height:${H+8}px;display:block;" preserveAspectRatio="none" data-metric="${metric}">${grid}${aP}${aC}${pP.length>1?`<path d="${mkP(pP)}" fill="none" stroke="#E8A33D" stroke-width="2" stroke-dasharray="6 3"/>`:''} ${pC.length>1?`<path d="${mkP(pC)}" fill="none" stroke="#2E8FB0" stroke-width="2.5"/>`:''} ${addons}${dP}${dC}${xlbls}</svg>`;
}
function attachChart(sid,wks,metric){
  metric=metric||'fcl';
  const kC=metric==='fcl'?'fcl_conf':'pal_conf',kP=metric==='fcl'?'fcl_proj':'pal_proj',kA=metric==='fcl'?'fcl_addon':'pal_addon';
  const unitLbl=metric==='fcl'?'FCL':'Pallets';
  const el=document.getElementById(sid);if(!el)return;
  el.querySelectorAll('circle.dlc').forEach(dot=>{
    dot.addEventListener('mouseenter',()=>{
      const i=+dot.dataset.i,w=wks[i];
      const up=(w[kP]+w[kA])>=w[kC];const ac=up?'#2E8B57':'#C0392B';
      ttEl.innerHTML=`<div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,.15);">${w.label}</div>
        <div style="display:flex;gap:7px;margin-bottom:4px;"><span style="width:8px;height:8px;border-radius:50%;background:#2E8FB0;flex-shrink:0;margin-top:2px;"></span><span style="flex:1;opacity:.85;">Confirmado</span><b style="font-family:'JetBrains Mono',monospace;">${f1(w[kC])} ${unitLbl}</b></div>
        <div style="display:flex;gap:7px;margin-bottom:4px;"><span style="width:8px;height:8px;border-radius:50%;background:#E8A33D;flex-shrink:0;margin-top:2px;"></span><span style="flex:1;opacity:.85;">Proy. SOP+PRE</span><b style="font-family:'JetBrains Mono',monospace;">${f1(w[kP])} ${unitLbl}</b></div>
        ${w[kA]>0?`<div style="display:flex;gap:7px;margin-bottom:4px;"><span style="width:8px;height:8px;border-radius:3px;background:${ac};flex-shrink:0;margin-top:2px;"></span><span style="flex:1;opacity:.85;">ADD+EXPO</span><b style="font-family:'JetBrains Mono',monospace;color:${ac};">${up?'▲':'▼'}${f1(w[kA])}</b></div>`:''}
        <div style="border-top:1px solid rgba(255,255,255,.15);margin-top:6px;padding-top:5px;display:flex;justify-content:space-between;"><span style="opacity:.8">% Ejec.</span><b style="font-family:'JetBrains Mono',monospace;">${w[kP]>0?fp(w[kC]/w[kP]*100):'—'}</b></div>`;
      ttEl.style.opacity='1';
      const rect=el.getBoundingClientRect();
      const cx=+dot.getAttribute('cx')*(rect.width/900),cy=+dot.getAttribute('cy')*(rect.height/328);
      let left=cx+12,top=cy+18;if(left+200>rect.width)left=cx-205;
      ttEl.style.left=(rect.left+left+window.scrollX)+'px';ttEl.style.top=(rect.top+top+window.scrollY)+'px';
    });
    dot.addEventListener('mouseleave',()=>{ttEl.style.opacity='0';});
  });
}

function renderForecast(){

let portsMetric='fcl';
function portsSetMetric(m){
  portsMetric=m;
  document.getElementById('ports-btn-fcl').classList.toggle('active',m==='fcl');
  document.getElementById('ports-btn-po').classList.toggle('active',m==='po');

function renderPorts(){

  const selST=ddChecked('ports-st-panel');
  const selPP=ddChecked('ports-pp-panel').map(v=>+v);
  let ft=PORTS_RAW;
  if(selST.length)ft=ft.filter(r=>selST.includes(r.status));
  if(selPP.length)ft=ft.filter(r=>selPP.includes(r.pack_plan));
  document.getElementById('ports-gstat').textContent=`${ft.length} de ${PORTS_RAW.length} registros`;

  const total_recs=ft.length,confirmados=ft.filter(r=>r.status==='Confirmado').length,proyectados=ft.filter(r=>r.status==='Proyectado').length,cancelados=ft.filter(r=>r.status==='Cancelado').length;
  const tasa_conf=total_recs?confirmados/total_recs*100:0,tasa_canc=total_recs?cancelados/total_recs*100:0;
  document.getElementById('ports-kg').innerHTML=`<div class="kc" style="--acc:#2E8FB0"><div class="kl">Total</div><div class="kv">${total_recs}</div></div><div class="kc" style="--acc:#2E8FB0"><div class="kl">Confirmados</div><div class="kv">${confirmados}</div><div class="kf">${total_recs?fp(tasa_conf):'—'}</div></div><div class="kc" style="--acc:#D7CDB0"><div class="kl">Proyectados</div><div class="kv">${proyectados}</div><div class="kf">${total_recs?fp(proyectados/total_recs*100):'—'}</div></div><div class="kc" style="--acc:#C0392B"><div class="kl">Cancelados</div><div class="kv">${cancelados}</div><div class="kf">${total_recs?fp(tasa_canc):'—'}</div></div>`;

  const colors={"Lima":"#E8A33D","Callao":"#2E8FB0","Chancay":"#163B54","Paita":"#7A6FD0"};
  const ports=["Lima","Callao","Chancay","Paita"];
  const portStats=ports.map(port=>{
    const sub=ft.filter(r=>r.port===port);
    const tot=sub.length;
    const c=sub.filter(r=>r.status==='Confirmado').length,p=sub.filter(r=>r.status==='Proyectado').length,k=sub.filter(r=>r.status==='Cancelado').length;
    const cumpl=tot?c/tot*100:0;
    const confSub=sub.filter(r=>r.status==='Confirmado');
    const metricVal=portsMetric==='fcl'?confSub.reduce((a,r)=>a+r.fcl,0):new Set(confSub.filter(r=>r.po).map(r=>r.po)).size;
    const modeCounts={};sub.forEach(r=>{if(r.mode)modeCounts[r.mode]=(modeCounts[r.mode]||0)+1;});
    const mode=Object.keys(modeCounts).sort((a,b)=>modeCounts[b]-modeCounts[a])[0]||'';
    return{port,conf:c,proy:p,canc:k,total:tot,cumpl,metricVal,mode,color:colors[port]};
  }).filter(p=>p.total>0);

  const portCards=portStats.map(p=>{const c=Math.min(p.cumpl,100),cc=c>=80?'var(--ok)':c>=50?'var(--warn)':'var(--bad)',sl=c>=80?'✅ Óptimo':c>=50?'⚠️ Revisar':'🔴 Crítico';
    return`<div class="port-card" style="--pc:${p.color}"><div class="pcn">${p.port}<span class="badge" style="background:${p.color}20;color:${p.color};">${p.mode==='Aéreo'?'✈':p.mode==='Marítimo'?'⚓':'🚚'} ${p.mode||'—'}</span></div><div class="pcs"><span>${portsMetric==='fcl'?'FCL conf.':'PO conf.'}</span><b>${portsMetric==='fcl'?f1(p.metricVal):p.metricVal}</b></div><div class="pcs"><span>Confirmado</span><b style="color:#2E8FB0">${p.conf}</b></div><div class="pcs"><span>Proyectado</span><b>${p.proy}</b></div><div class="pcs"><span>Cancelado</span><b style="color:var(--bad)">${p.canc}</b></div><div class="pcs"><span>% Cumplimiento</span><b style="color:${cc}">${fp(c)}</b></div><div class="pcm"><div style="width:${(p.conf/p.total*100).toFixed(1)}%;background:#2E8FB0"></div><div style="width:${(p.proy/p.total*100).toFixed(1)}%;background:#D7CDB0"></div><div style="width:${(p.canc/p.total*100).toFixed(1)}%;background:#C0392B"></div></div><div class="pc-footer"><div class="pc-stat"><div class="pc-stat-val">${p.total}</div><div class="pc-stat-lbl">Registros</div></div><div class="pc-stat"><div class="pc-stat-val" style="font-size:14px;color:${cc}">${fp(c)}</div><div class="pc-stat-lbl">Cumplim.</div></div></div><div style="margin-top:8px;font-size:10px;text-align:center;padding:4px 8px;border-radius:6px;background:${p.color}15;color:${p.color};font-weight:600;">${sl}</div></div>`;
  }).join('');
  document.getElementById('ports-cards').innerHTML=portCards||'<div style="color:var(--mu);font-size:12px;padding:12px;">Sin registros para este filtro</div>';

  const portBars=portStats.map(p=>`<div style="display:grid;grid-template-columns:72px 1fr 72px;align-items:center;gap:8px;margin-bottom:8px;"><div style="text-align:right;font-size:11px;font-weight:500;">${p.port}</div><div style="background:#EFEBE0;border-radius:5px;height:14px;overflow:hidden;display:flex;"><div style="width:${(p.conf/p.total*100).toFixed(1)}%;background:#2E8FB0;height:100%;"></div><div style="width:${(p.proy/p.total*100).toFixed(1)}%;background:#D7CDB0;height:100%;"></div><div style="width:${(p.canc/p.total*100).toFixed(1)}%;background:#C0392B;height:100%;"></div></div><div style="font-family:'JetBrains Mono',monospace;font-weight:600;font-size:11px;">${p.total}</div></div>`).join('');
  document.getElementById('ports-bars').innerHTML=portBars||'<div style="color:var(--mu);font-size:12px;padding:8px;">Sin datos</div>';

  const slices=[{n:'Confirmado',v:confirmados,c:'#2E8FB0'},{n:'Proyectado',v:proyectados,c:'#D7CDB0'},{n:'Cancelado',v:cancelados,c:'#C0392B'}];
  let cum=0;const conic=total_recs?slices.map(s=>{const st=cum,en=cum+(s.v/total_recs*360);cum=en;return`${s.c} ${st.toFixed(1)}deg ${en.toFixed(1)}deg`;}).join(','):'#EFEBE0 0deg 360deg';
  document.getElementById('ports-donut').innerHTML=`<div style="width:120px;height:120px;border-radius:50%;background:conic-gradient(${conic});flex-shrink:0;position:relative;"><div style="position:absolute;inset:16px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;"><div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;">${total_recs}</div><div style="font-size:8px;color:var(--mu);">total</div></div></div><div class="dl">${slices.map(s=>`<div class="dli"><span class="dls" style="background:${s.c}"></span><span>${s.n}</span><span class="dlv">${s.v}·${total_recs?fp(s.v/total_recs*100):'0%'}</span></div>`).join('')}</div>`;

  // Proyección por Puertos — stacked distribution by Pack Plan, respects the same global filters
  const weeks=[...new Set(ft.map(r=>r.pack_plan))].sort((a,b)=>a-b);
  const byWeekPort={};
  weeks.forEach(wk=>{byWeekPort[wk]={};ports.forEach(p=>byWeekPort[wk][p]=0);});
  ft.forEach(r=>{
    if(!ports.includes(r.port))return;
    if(portsMetric==='fcl')byWeekPort[r.pack_plan][r.port]+=r.fcl;
    else byWeekPort[r.pack_plan][r.port]+=1;
  });
  const mx=Math.max(...weeks.map(wk=>ports.reduce((a,p)=>a+byWeekPort[wk][p],0)),1);
  const cols=weeks.map(wk=>{
    const tot=ports.reduce((a,p)=>a+byWeekPort[wk][p],0);
    const h=(tot/mx*100).toFixed(1);
    const segs=ports.map(p=>`<div class="seg" style="height:${tot>0?(byWeekPort[wk][p]/tot*100).toFixed(1):0}%;background:${colors[p]};"></div>`).join('');
    return`<div class="sc-col" data-wk="${wk}" style="cursor:pointer;"><div class="sc-val">${portsMetric==='fcl'?f1(tot):tot}</div><div class="sc-bars" style="height:${h}%;">${segs}</div><div class="sc-lbl">S${wk}</div></div>`;
  }).join('');
  document.getElementById('ports-proj-chart').innerHTML=cols||'<div style="color:var(--mu);font-size:12px;padding:20px;">Sin registros para este filtro</div>';
  document.getElementById('ports-proj-legend').innerHTML=ports.map(p=>`<div class="li2"><span class="ld2" style="background:${colors[p]}"></span>${p}</div>`).join('');
  document.getElementById('ports-proj-stat').textContent=`${weeks.length} semana(s) · métrica: ${portsMetric==='fcl'?'FCL':'PO'}`;
  const unit=portsMetric==='fcl'?'FCL':'PO';
  document.querySelectorAll('#ports-proj-chart .sc-col').forEach(col=>{
    col.addEventListener('mouseenter',()=>{
      const wk=+col.dataset.wk;
      const tot=ports.reduce((a,p)=>a+byWeekPort[wk][p],0);
      ttEl.innerHTML=`<div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,.15);">Pack Plan S${wk}</div>`+
        ports.map(p=>`<div style="display:flex;gap:7px;margin-bottom:4px;"><span style="width:8px;height:8px;border-radius:2px;background:${colors[p]};flex-shrink:0;margin-top:2px;"></span><span style="flex:1;opacity:.85;">${p}</span><b style="font-family:'JetBrains Mono',monospace;">${portsMetric==='fcl'?f1(byWeekPort[wk][p]):byWeekPort[wk][p]} ${unit}</b></div>`).join('')+
        `<div style="border-top:1px solid rgba(255,255,255,.15);margin-top:6px;padding-top:5px;display:flex;justify-content:space-between;"><span style="opacity:.8">Total</span><b style="font-family:'JetBrains Mono',monospace;">${portsMetric==='fcl'?f1(tot):tot} ${unit}</b></div>`;
      ttEl.style.opacity='1';
      const sr=col.parentElement.getBoundingClientRect(),cr=col.getBoundingClientRect();
      let left=cr.left-sr.left+cr.width/2-90,top=cr.top-sr.top+18;
      if(left<0)left=0;if(left+200>sr.width)left=sr.width-205;
      ttEl.style.left=(left+sr.left+window.scrollX)+'px';ttEl.style.top=(top+sr.top+window.scrollY)+'px';
    });
    col.addEventListener('mouseleave',()=>{ttEl.style.opacity='0';});
  });
}

function renderAirAll(){
  const selPPs=ddChecked('air-pp-panel').map(v=>+v);
  const selDD=ddChecked('air-dd-panel');
  const selLO=ddChecked('air-lo-panel');
  let ft=AIR;
  if(selPPs.length)ft=ft.filter(r=>selPPs.includes(r.pack_plan));
  if(selDD.length)ft=ft.filter(r=>selDD.includes(r.dispatch));
  if(selLO.length)ft=ft.filter(r=>selLO.includes(r.log_op));
  document.getElementById('air-gstat').textContent=`${ft.length} de ${AIR.length} registros`;

  const totPal=ft.reduce((a,r)=>a+r.pallets,0),fin=ft.filter(r=>r.basc==='FINALIZADO').length,poCount=new Set(ft.filter(r=>r.po).map(r=>r.po)).size;
  document.getElementById('air-kg').innerHTML=`<div class="kc" style="--acc:#2E8FB0"><div class="kl">DESPACHOS (REGISTRO TOTAL)</div><div class="kv">${ft.length}</div></div><div class="kc" style="--acc:#E8A33D"><div class="kl">PO ASIGNADA</div><div class="kv">${poCount}</div><div class="kf">${ft.length?fp(poCount/ft.length*100):'—'}</div></div><div class="kc" style="--acc:#7A6FD0"><div class="kl">Pallets</div><div class="kv">${totPal}</div></div><div class="kc" style="--acc:#2E8B57"><div class="kl">BASC Final.</div><div class="kv">${fin}</div><div class="kf">${ft.length?fp(fin/ft.length*100):'—'}</div></div>`;

  const byLine={};
  ft.forEach(r=>{if(!r.po)return;const ln=r.line||'(sin línea)';if(!byLine[ln])byLine[ln]=new Set();byLine[ln].add(r.po);});
  const palette=["#E8A33D","#2E8FB0","#163B54","#7A6FD0","#C0392B","#2E8B57","#C77D1E","#9CA3AF","#6B7280","#1C2940"];
  const airlinesF=Object.entries(byLine).map(([name,s])=>({name,count:s.size})).sort((a,b)=>b.count-a.count).map((a,i)=>({...a,color:palette[i%palette.length]}));
  const totalPO=airlinesF.reduce((a,x)=>a+x.count,0)||1,mxPO=Math.max(...airlinesF.map(a=>a.count),1);
  const airBars=airlinesF.map(a=>`<div style="display:grid;grid-template-columns:100px 1fr 90px;align-items:center;gap:8px;margin-bottom:8px;"><div style="text-align:right;font-size:11px;font-weight:500;display:flex;align-items:center;gap:5px;justify-content:flex-end;"><span style="width:8px;height:8px;border-radius:2px;background:${a.color};flex-shrink:0;"></span>${a.name}</div><div style="background:#EFEBE0;border-radius:5px;height:14px;overflow:hidden;"><div style="width:${(a.count/mxPO*100).toFixed(1)}%;background:${a.color};height:100%;border-radius:5px;"></div></div><div style="font-family:'JetBrains Mono',monospace;font-weight:600;font-size:11px;">${a.count}<span style="color:var(--mu);font-weight:400;font-size:9.5px;"> ${fp(a.count/totalPO*100)}</span></div></div>`).join('');
  let cumA=0;const airConic=airlinesF.map(a=>{const st=cumA,en=cumA+(a.count/totalPO*360);cumA=en;return`${a.color} ${st.toFixed(1)}deg ${en.toFixed(1)}deg`;}).join(',')||'#EFEBE0 0deg 360deg';
  const airLeg=airlinesF.map(a=>`<div class="dli"><span class="dls" style="background:${a.color}"></span><span>${a.name}</span><span class="dlv">${a.count}·${fp(a.count/totalPO*100)}</span></div>`).join('');

}

function renderAirTable(ft){
  const tblR=ft.map(r=>{const cl=r.basc==='FINALIZADO'?'ok':r.basc.includes('PACKING')||r.basc.includes('RUTA')?'warn':r.basc?'bad':'neu';const js=JSON.stringify(r).replace(/\\/g,'\\\\').replace(/'/g,"\\'");return`<tr><td>${r.shipper||'—'}</td><td class="mono">${r.instruction||'—'}</td><td>${r.log_op||'—'}</td><td>${r.dest||'—'}</td><td class="mono">${r.dispatch||'—'}</td><td class="num">${r.pallets||0}</td><td class="mono">${r.awb||'—'}</td><td class="mono">${r.file||'—'}</td><td>${r.line||'—'}</td><td>${r.transp_op||'—'}</td><td><span class="pill ${cl}" style="font-size:9px;">${r.basc||'—'}</span></td><td class="mono">${r.dam||'—'}</td><td><button class="btn-popup" onclick='openM(${js})'>🚛</button></td></tr>`;}).join('');
  document.getElementById('air-body').innerHTML=tblR;
  document.getElementById('air-stat').textContent=`${ft.length} filas`;
}

function renderAirTransport(ft){
  const pkGroups={};
  ft.forEach(r=>{const pk=r.packing||'(en blanco)';if(!pkGroups[pk])pkGroups[pk]={};const ins=r.instruction||'(en blanco)';if(!pkGroups[pk][ins])pkGroups[pk][ins]=[];pkGroups[pk][ins].push(r);});
  let html='',gtPal=0,gtFcl=0,rows=0;
  Object.keys(pkGroups).sort().forEach(pk=>{
    const insMap=pkGroups[pk];let pkPal=0,pkFcl=0,pkFirst=true;
    Object.keys(insMap).sort().forEach(ins=>{
      const recs=insMap[ins];let insPal=0,insFcl=0;
      recs.forEach((r,i)=>{
        insPal+=r.pallets;insFcl+=r.fcl;rows++;
        html+=`<tr>${(pkFirst&&i===0)?`<td rowspan="PK_${pk}" style="background:#E8F4F8;font-weight:700;border-right:2px solid var(--sky);vertical-align:top;">${pk}</td>`:''}${i===0?`<td rowspan="${recs.length}" style="vertical-align:top;font-weight:500;">${ins}</td>`:''}<td class="mono">${r.dispatch||'—'}</td><td>${r.shipper||'—'}</td><td>${r.log_op||'(en blanco)'}</td><td class="mono">${r.postime||'(en blanco)'}</td><td>${r.gatein||'(en blanco)'}</td><td class="fv">${r.pallets||0}</td><td class="fv">${f1(r.fcl)}</td></tr>`;
      });
      html+=`<tr class="pk-total"><td colspan="2">Total ${ins}</td><td colspan="4"></td><td class="fv">${insPal}</td><td class="fv">${f1(insFcl)}</td></tr>`;
      pkPal+=insPal;pkFcl+=insFcl;pkFirst=false;
    });
    html+=`<tr class="grand-total"><td colspan="2">Total ${pk}</td><td colspan="4"></td><td class="fv">${pkPal}</td><td class="fv">${f1(pkFcl)}</td></tr>`;
    gtPal+=pkPal;gtFcl+=pkFcl;
  });
  html+=`<tr class="grand-total" style="background:#163B54;color:#fff;"><td colspan="6">Total general</td><td class="fv">${gtPal}</td><td class="fv">${f1(gtFcl)}</td></tr>`;
  document.getElementById('at-body').innerHTML=html;
  Object.keys(pkGroups).forEach(pk=>{
    let n=0;Object.values(pkGroups[pk]).forEach(recs=>n+=recs.length+1);
    document.querySelectorAll(`td[rowspan="PK_${pk}"]`).forEach(td=>td.setAttribute('rowspan',n));
  });
  document.getElementById('at-stat').textContent=`${rows} filas · ${f1(gtFcl)} FCL`;
}

function renderWeekly(){
  const selPPs=ddChecked('wk-pp-panel').map(v=>+v);
  const selPKs=ddChecked('wk-pk-panel');
  const selSHs=ddChecked('wk-sh-panel');
  const selMOs=ddChecked('wk-mo-panel');
  let ft=WROWS;
  if(selPPs.length)ft=ft.filter(r=>selPPs.includes(r.pack_plan));
  if(selPKs.length)ft=ft.filter(r=>selPKs.includes(r.packing));
  if(selSHs.length)ft=ft.filter(r=>selSHs.includes(r.shipper));
  if(selMOs.length)ft=ft.filter(r=>selMOs.includes(r.mode));
  const allDates=[...new Set(ft.map(r=>r.date).filter(Boolean))].sort();
  const hasSF=ft.some(r=>!r.date),cols=[...allDates,...(hasSF?['']:[])];
  const cell={},pkSet=new Set(),modeByPk={},shipByPkMode={},podByPkModeShip={};
  ft.forEach(r=>{const dk=r.date||'',key=`${r.packing}||${r.mode}||${r.shipper}||${r.pod}`;if(!cell[key])cell[key]={};cell[key][dk]=(cell[key][dk]||0)+r.fcl;pkSet.add(r.packing);if(!modeByPk[r.packing])modeByPk[r.packing]=new Set();modeByPk[r.packing].add(r.mode);const pmk=`${r.packing}||${r.mode}`;if(!shipByPkMode[pmk])shipByPkMode[pmk]=new Set();shipByPkMode[pmk].add(r.shipper);const pmsk=`${r.packing}||${r.mode}||${r.shipper}`;if(!podByPkModeShip[pmsk])podByPkModeShip[pmsk]=new Set();podByPkModeShip[pmsk].add(r.pod);});
  const packings=[...pkSet].sort(),mO=['Aéreo','Marítimo','Terrestre'];
  const mIcon=m=>m==='Aéreo'?'✈':m==='Marítimo'?'⚓':'🛣️',mCls=m=>m==='Aéreo'?'mA':m==='Marítimo'?'mM':'mT';
  document.getElementById('wk-head').innerHTML=`<tr><th>Packing</th><th>Mode</th><th>Shipper</th><th>POD</th>${cols.map(d=>`<th class="dh">${d?fmtDate(d):'Sin fecha'}</th>`).join('')}<th class="tot-h">Total</th></tr>`;
  const gt={};cols.forEach(d=>{gt[d]=0;});gt['__t']=0;
  let html='';
  packings.forEach(pk=>{
    const pkT={};cols.forEach(d=>{pkT[d]=0;});pkT['__t']=0;let pkN=0;
    const modes=[...modeByPk[pk]].sort((a,b)=>mO.indexOf(a)-mO.indexOf(b));
    modes.forEach(mode=>{
      const pmk=`${pk}||${mode}`,shippers=[...shipByPkMode[pmk]].sort();
      shippers.forEach(sh=>{
        const pmsk=`${pk}||${mode}||${sh}`,pods=[...podByPkModeShip[pmsk]].sort();
        pods.forEach((pod,pi)=>{
          const key=`${pk}||${mode}||${sh}||${pod}`,data=cell[key]||{};let rt=0;
          const cells=cols.map(d=>{const v=data[d]||0;pkT[d]+=v;gt[d]+=v;rt+=v;return v>0?`<td class="fv">${f1(v)}</td>`:`<td class="fz">·</td>`;}).join('');
          pkT['__t']+=rt;gt['__t']+=rt;
          html+=`<tr>${pkN===0?`<td rowspan="PKSP_${pk}" style="background:#E8F4F8;font-weight:700;border-right:2px solid var(--sky);vertical-align:top;padding-top:8px;">${pk}</td>`:''} ${pi===0&&pods.indexOf(pod)===0&&shippers.indexOf(sh)===0?`<td rowspan="MDSP_${pk}_${mode}" style="vertical-align:top;padding-top:7px;"><span class="mode-badge ${mCls(mode)}">${mIcon(mode)} ${mode}</span></td>`:''} ${pi===0?`<td rowspan="${pods.length}" style="vertical-align:top;padding-top:7px;font-weight:500;">${sh}</td>`:''}<td>${pod}</td>${cells}<td class="tot-v">${rt}</td></tr>`;
          pkN++;
        });
      });
    });
    html+=`<tr class="pk-total"><td colspan="4">Total ${pk}</td>${cols.map(d=>pkT[d]>0?`<td class="fv">${f1(pkT[d])}</td>`:`<td class="fz">·</td>`).join('')}<td class="tot-v">${f1(pkT['__t'])}</td></tr>`;
  });
  html+=`<tr class="grand-total"><td colspan="4">Total general</td>${cols.map(d=>gt[d]>0?`<td class="fv">${f1(gt[d])}</td>`:`<td class="fz" style="color:#666;">·</td>`).join('')}<td class="tot-v">${f1(gt['__t'])}</td></tr>`;
  document.getElementById('wk-body').innerHTML=html;
  // Fix rowspans
  packings.forEach(pk=>{
    document.querySelectorAll(`td[rowspan="PKSP_${pk}"]`).forEach(td=>{let n=0;[...modeByPk[pk]].sort((a,b)=>mO.indexOf(a)-mO.indexOf(b)).forEach(m=>{const pmk=`${pk}||${m}`;[...shipByPkMode[pmk]].sort().forEach(sh=>{n+=[...podByPkModeShip[`${pk}||${m}||${sh}`]].length;});});td.setAttribute('rowspan',n);});
    [...modeByPk[pk]].sort((a,b)=>mO.indexOf(a)-mO.indexOf(b)).forEach(m=>{document.querySelectorAll(`td[rowspan="MDSP_${pk}_${m}"]`).forEach(td=>{let n=0;const pmk=`${pk}||${m}`;[...shipByPkMode[pmk]].sort().forEach(sh=>{n+=[...podByPkModeShip[`${pk}||${m}||${sh}`]].length;});td.setAttribute('rowspan',n);});});
  });
  document.getElementById('wk-stat').textContent=`${ft.length} filas · ${f1(gt['__t'])} FCL`;
}

  if(gPK&&gPK!=='ALL')ft=ft.filter(r=>r.packing===gPK);
  if(gPPs&&gPPs.length)ft=ft.filter(r=>gPPs.includes(r.pack_plan));
  if(gDD&&gDD.length)ft=ft.filter(r=>gDD.includes(r.dispatch_date||''));
  if(gMO&&gMO.length)ft=ft.filter(r=>gMO.includes(r.mode));
  const modeMeta={'Aéreo':{ic:'✈',c:'#2E8FB0'},'Marítimo':{ic:'⚓',c:'#163B54'},'Terrestre':{ic:'🚚',c:'#7A6FD0'}};
  const modes=Object.keys(modeMeta);
  const byMode=modes.map(m=>{const sub=ft.filter(r=>r.mode===m);return{mode:m,fcl:sub.reduce((a,r)=>a+r.fcl,0),po:new Set(sub.filter(r=>r.po).map(r=>r.po)).size};});
  const bascGroups={};
  ft.forEach(r=>{const b=r.basc||'(sin estado)';bascGroups[b]=(bascGroups[b]||0)+r.fcl;});
  const bascRows=Object.entries(bascGroups).sort((a,b)=>b[1]-a[1]);
  const bascMax=Math.max(...bascRows.map(r=>r[1]),1);
  const totalFcl=ft.reduce((a,r)=>a+r.fcl,0);
  const citaFcl=ft.filter(r=>r.retiro_cita).reduce((a,r)=>a+r.fcl,0);
  const loadFcl=ft.filter(r=>r.load_status==='CARGADO').reduce((a,r)=>a+r.fcl,0);
  const citaPct=totalFcl>0?citaFcl/totalFcl*100:0,loadPct=totalFcl>0?loadFcl/totalFcl*100:0;
  const ring=(pct,col)=>{const r=22,c=2*Math.PI*r,off=c-(pct/100)*c;return`<svg width="52" height="52" viewBox="0 0 52 52" style="flex-shrink:0;"><circle cx="26" cy="26" r="${r}" fill="none" stroke="var(--line)" stroke-width="5"/><circle cx="26" cy="26" r="${r}" fill="none" stroke="${col}" stroke-width="5" stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 26 26)"/></svg>`;};
  const modeRows=byMode.map(m=>`<div class="pmi-mode-row"><div class="pmi-mode-lbl" style="--mc:${modeMeta[m.mode].c};"><span class="pmi-mode-ic">${modeMeta[m.mode].ic}</span>${m.mode}</div><div class="pmi-mode-val">${m.po}<span class="pmi-mode-sub">(${f1(m.fcl)} FCL)</span></div></div>`).join('');
  const bascRowsHtml=bascRows.map(([b,v])=>`<div class="pmi-basc-row"><div class="pmi-basc-lbl">${b}</div><div class="pmi-basc-bar-wrap"><div class="pmi-basc-bar" style="width:${(v/bascMax*100).toFixed(1)}%;"></div></div><div class="pmi-basc-val">${f1(v)}</div></div>`).join('');
  document.getElementById('pmi-kpis').innerHTML=`
    <div class="pmi-kpi-zone">
      <div class="pmi-kpi-col" style="min-width:230px;">
        <div class="pmi-kpi-h">Modo · PO diferenciados <span class="pmi-kpi-h-sub">(Σ FCL)</span></div>
        <div class="pmi-mode-tbl">${modeRows}</div>
      </div>
      <div class="pmi-kpi-col" style="flex:1;min-width:260px;">
        <div class="pmi-kpi-h">Σ FCL por Journey Status BASC</div>
        <div class="pmi-basc-list">${bascRowsHtml}</div>
      </div>
      <div class="pmi-kpi-col" style="min-width:280px;">
        <div class="pmi-kpi-h">Cobertura</div>
        <div style="display:flex;gap:14px;">
          <div class="pmi-ring-card">${ring(citaPct,'#2E8B57')}<div><div class="pmi-ring-t">Cita de retiro</div><div class="pmi-ring-v">${f1(citaFcl)}<span class="pmi-ring-u"> / ${f1(totalFcl)}</span></div><div class="pmi-ring-p" style="color:#2E8B57;">${totalFcl>0?fp(citaPct):'—'}</div></div></div>
          <div class="pmi-ring-card">${ring(loadPct,'#E8A33D')}<div><div class="pmi-ring-t">Cargados</div><div class="pmi-ring-v">${f1(loadFcl)}<span class="pmi-ring-u"> / ${f1(totalFcl)}</span></div><div class="pmi-ring-p" style="color:#E8A33D;">${totalFcl>0?fp(loadPct):'—'}</div></div></div>
        </div>
      </div>
    </div>`;
}

function renderTR(gPK,gPPs,gDD,gMO){
  const selLN=document.getElementById('tr-ln').value;
  const selTTs=ddChecked('tr-tt-panel');
  let ft=TR_PROGRAM;
  if(gPK&&gPK!=='ALL')ft=ft.filter(r=>r.packing===gPK);
  if(gPPs&&gPPs.length)ft=ft.filter(r=>gPPs.includes(r.pack_plan));
  if(gDD&&gDD.length)ft=ft.filter(r=>gDD.includes(r.dispatch_date||''));
  if(gMO&&gMO.length)ft=ft.filter(r=>gMO.includes(r.mode));
  if(selLN!=='ALL')ft=ft.filter(r=>r.line===selLN);
  ft=ft.filter(r=>selTTs.includes(r.tr_time||''));
  const pkGroups={};
  ft.forEach(r=>{const pk=r.packing||'(en blanco)';if(!pkGroups[pk])pkGroups[pk]={};const ln=r.line||'(en blanco)';if(!pkGroups[pk][ln])pkGroups[pk][ln]=[];pkGroups[pk][ln].push(r);});
  let html='',rows=0;
  Object.keys(pkGroups).sort().forEach(pk=>{
    const lnMap=pkGroups[pk];
    let pkRowCount=0;Object.values(lnMap).forEach(recs=>pkRowCount+=recs.length);
    let pkFirst=true;
    Object.keys(lnMap).sort().forEach(ln=>{
      const recs=lnMap[ln];
      recs.forEach((r,i)=>{
        rows++;
        html+=`<tr>${pkFirst?`<td rowspan="${pkRowCount}" style="background:#163B54;color:#fff;font-weight:700;text-align:center;vertical-align:middle;">${pk}</td><td rowspan="${pkRowCount}" style="vertical-align:middle;">${r.log_op||'—'}</td><td rowspan="${pkRowCount}" style="vertical-align:middle;">${r.senasa_att||'—'}</td>`:''}${i===0?`<td rowspan="${recs.length}" style="vertical-align:middle;font-weight:600;">${ln}</td>`:''}<td class="mono">${r.dispatch_date||'—'}</td><td class="mono">${r.insp_time||'—'}</td><td class="mono">${r.tr_time||'—'}</td><td>${r.assigned_tr||'—'}</td><td class="mono">${r.booking||'—'}</td><td>${r.inspector||'—'}</td></tr>`;
        pkFirst=false;
      });
    });
  });
  document.getElementById('tr-body').innerHTML=html||'<tr><td colspan="10" style="text-align:center;color:var(--mu);padding:16px;">Sin registros para este filtro</td></tr>';
  document.getElementById('tr-stat').textContent=`${rows} filas`;
}

function renderEmbarques(gPK,gPPs,gDD,gMO){

function renderSenasa(gPK,gPPs,gDD,gMO){
  const selIN=document.getElementById('sn-in').value;
  let ft=SENASA;
  if(gPK&&gPK!=='ALL')ft=ft.filter(r=>r.packing===gPK);
  if(gPPs&&gPPs.length)ft=ft.filter(r=>gPPs.includes(r.pack_plan));
  if(gDD&&gDD.length)ft=ft.filter(r=>gDD.includes(r.dispatch_date||''));
  if(gMO&&gMO.length)ft=ft.filter(r=>gMO.includes(r.mode));
  if(selIN!=='ALL')ft=ft.filter(r=>r.inspector===selIN);

  // Columns = unique inspection times (sorted)
  const allTimes=[...new Set(ft.map(r=>r.insp_time).filter(Boolean))].sort();
  const hasST=ft.some(r=>!r.insp_time),cols=[...allTimes,...(hasST?['']:[])];

  // Build cell data: key = packing|insp_date|mode|pod|senasa_att → time → COUNT of distinct PO (pedidos)
  const cell={},cellPO={},pkSet=new Set(),dateByPk={},modeByPkDate={},podByPkDateMode={},attByPkDateModePod={};
  ft.forEach((r,ridx)=>{
    const dk=r.insp_date||'',pk=r.packing;
    const key=`${pk}||${dk}||${r.mode}||${r.pod}||${r.senasa_att}`;
    const tk=r.insp_time||'';
    if(!cellPO[key])cellPO[key]={};
    if(!cellPO[key][tk])cellPO[key][tk]=new Set();
    cellPO[key][tk].add(r.po||('__row'+ridx));
    pkSet.add(pk);
    if(!dateByPk[pk])dateByPk[pk]=new Set();dateByPk[pk].add(dk);
    const pdKey=`${pk}||${dk}`;
    if(!modeByPkDate[pdKey])modeByPkDate[pdKey]=new Set();modeByPkDate[pdKey].add(r.mode);
    const pdmKey=`${pk}||${dk}||${r.mode}`;
    if(!podByPkDateMode[pdmKey])podByPkDateMode[pdmKey]=new Set();podByPkDateMode[pdmKey].add(r.pod);
    const pdmpKey=`${pk}||${dk}||${r.mode}||${r.pod}`;
    if(!attByPkDateModePod[pdmpKey])attByPkDateModePod[pdmpKey]=new Set();attByPkDateModePod[pdmpKey].add(r.senasa_att);
  });

  const packings=[...pkSet].sort();
  const mO=['Aéreo','Marítimo','Terrestre'];
  const mIcon=m=>m==='Aéreo'?'✈':m==='Marítimo'?'⚓':'🛣️',mCls=m=>m==='Aéreo'?'mA':m==='Marítimo'?'mM':'mT';

  document.getElementById('sn-head').innerHTML=`<tr>
    <th>Packing</th><th>Loading Date</th><th>Mode</th><th>POD</th><th>SENASA Att.</th>
    ${cols.map(t=>`<th class="time-h">${t||'Sin hora'}</th>`).join('')}
    <th class="tot-h">Total</th>
  </tr>`;

  const gt={};cols.forEach(t=>{gt[t]=0;});gt['__t']=0;
  let html='';
  packings.forEach(pk=>{
    const dates=[...dateByPk[pk]].sort();
    const pkT={};cols.forEach(t=>{pkT[t]=0;});pkT['__t']=0;
    let pkRows=0;

    dates.forEach(dk=>{
      const pdKey=`${pk}||${dk}`;
      const dateT={};cols.forEach(t=>{dateT[t]=0;});dateT['__t']=0;
      const modes=[...modeByPkDate[pdKey]].sort((a,b)=>mO.indexOf(a)-mO.indexOf(b));
      let dateRows=0;

      modes.forEach(mode=>{
        const pdmKey=`${pk}||${dk}||${mode}`,pods=[...podByPkDateMode[pdmKey]].sort();
        pods.forEach(pod=>{
          const pdmpKey=`${pk}||${dk}||${mode}||${pod}`,atts=[...attByPkDateModePod[pdmpKey]].sort();
          atts.forEach((att,ai)=>{
            const key=`${pk}||${dk}||${mode}||${pod}||${att}`,data=cellPO[key]||{};
            let rt=0;
            const cells=cols.map(t=>{const v=data[t]?data[t].size:0;pkT[t]+=v;gt[t]+=v;dateT[t]+=v;rt+=v;return v>0?`<td class="tv">${v}</td>`:`<td class="tz">·</td>`;}).join('');
            pkT['__t']+=rt;gt['__t']+=rt;dateT['__t']+=rt;
            const attBadge=att==='PA'?`<span class="att-pa">PA</span>`:`<span class="att-sn">SENASA</span>`;
            const showPk=pkRows===0,showDate=dateRows===0&&pods.indexOf(pod)===0&&atts.indexOf(att)===0,showMode=pods.indexOf(pod)===0&&atts.indexOf(att)===0,showPod=atts.indexOf(att)===0;
            html+=`<tr>
              ${showPk?`<td rowspan="PKSP2_${pk}" style="background:#E8F4F8;font-weight:700;border-right:2px solid var(--sky);vertical-align:top;padding-top:8px;">${pk}</td>`:''}
              ${showDate?`<td rowspan="DTSP_${pk}_${dk.replace(/-/g,'')}" style="vertical-align:top;padding-top:7px;font-family:'JetBrains Mono',monospace;font-size:10px;">${dk?fmtDate(dk):'Sin fecha'}</td>`:''}
              ${showMode?`<td rowspan="MDSP2_${pk}_${dk.replace(/-/g,'')}_${mode}" style="vertical-align:top;padding-top:7px;"><span class="mode-badge ${mCls(mode)}">${mIcon(mode)} ${mode}</span></td>`:''}
              ${showPod?`<td rowspan="${atts.length}" style="vertical-align:top;padding-top:7px;">${pod}</td>`:''}
              <td>${attBadge}</td>
              ${cells}
              <td class="tot-v">${rt}</td>
            </tr>`;
            pkRows++;dateRows++;
          });
        });
      });
      // Date subtotal
      html+=`<tr class="date-total"><td colspan="4">Total ${dk?fmtDate(dk):'Sin fecha'}</td>${cols.map(t=>dateT[t]>0?`<td class="tv">${dateT[t]}</td>`:`<td class="tz">·</td>`).join('')}<td class="tot-v">${dateT['__t']}</td></tr>`;
    });
  });
  // Grand total
  html+=`<tr class="grand-total"><td colspan="5">Total general</td>${cols.map(t=>gt[t]>0?`<td class="tv">${gt[t]}</td>`:`<td class="tz" style="color:#666;">·</td>`).join('')}<td class="tot-v">${gt['__t']}</td></tr>`;
  document.getElementById('sn-body').innerHTML=html;

  // Fix rowspans
  packings.forEach(pk=>{
    document.querySelectorAll(`td[rowspan="PKSP2_${pk}"]`).forEach(td=>{
      let n=0;
      const dates=[...dateByPk[pk]].sort();
      dates.forEach(dk=>{
        const pdKey=`${pk}||${dk}`;
        [...modeByPkDate[pdKey]].sort((a,b)=>mO.indexOf(a)-mO.indexOf(b)).forEach(mode=>{
          const pdmKey=`${pk}||${dk}||${mode}`;
          [...podByPkDateMode[pdmKey]].sort().forEach(pod=>{
            n+=[...attByPkDateModePod[`${pk}||${dk}||${mode}||${pod}`]].length;
          });
        });
        n++; // date total row
      });
      td.setAttribute('rowspan',n);
    });
    const dates=[...dateByPk[pk]].sort();
    dates.forEach(dk=>{
      const dtKey=dk.replace(/-/g,'');
      document.querySelectorAll(`td[rowspan="DTSP_${pk}_${dtKey}"]`).forEach(td=>{
        let n=0;const pdKey=`${pk}||${dk}`;
        [...modeByPkDate[pdKey]].sort((a,b)=>mO.indexOf(a)-mO.indexOf(b)).forEach(mode=>{
          const pdmKey=`${pk}||${dk}||${mode}`;
          [...podByPkDateMode[pdmKey]].sort().forEach(pod=>{n+=[...attByPkDateModePod[`${pk}||${dk}||${mode}||${pod}`]].length;});
        });
        td.setAttribute('rowspan',n);
      });
      const pdKey=`${pk}||${dk}`;
      [...modeByPkDate[pdKey]].sort((a,b)=>mO.indexOf(a)-mO.indexOf(b)).forEach(mode=>{
        const mdKey=`${dtKey}_${mode}`;
        document.querySelectorAll(`td[rowspan="MDSP2_${pk}_${mdKey}"]`).forEach(td=>{
          let n=0;const pdmKey=`${pk}||${dk}||${mode}`;
          [...podByPkDateMode[pdmKey]].sort().forEach(pod=>{n+=[...attByPkDateModePod[`${pk}||${dk}||${mode}||${pod}`]].length;});
          td.setAttribute('rowspan',n);
        });
      });
    });
  });
  document.getElementById('sn-stat').textContent=`${ft.length} filas · ${f1(gt['__t'])} FCL`;
}
